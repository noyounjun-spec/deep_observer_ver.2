<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심해의 기록자 : 아치의 탐험</title>
    <!-- QR 스캔을 위한 외부 라이브러리 불러오기 -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f8ff; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #0056b3; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        .logbook { margin-top: 20px; text-align: left; padding: 15px; background: #e6f2ff; border-radius: 10px; }
        .badge { display: inline-block; padding: 10px; margin: 5px; background: #ccc; color: white; border-radius: 5px; font-weight: bold; }
        .badge.active { background: #00bfff; }
        /* 팝업 모달 스타일 */
        #storyModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); color: white; z-index: 1000; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #004080; padding: 30px; border-radius: 15px; width: 80%; }
        button { background: #00bfff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 15px;}
    </style>
</head>
<body>

<div class="container">
    <h1>🌊 심해의 기록자</h1>
    <p>아치와 함께 보이지 않는 해경의 발자취를 찾으세요!</p>

    <!-- QR 카메라 영역 -->
    <div id="reader"></div>

    <!-- 탐사 일지 (로그북) -->
    <div class="logbook">
        <h3>📖 아치의 탐사 일지</h3>
        <p>수집한 해경 스킨 및 뱃지</p>
        <div id="badge-incheon" class="badge">인천: 잠금됨</div>
        <div id="badge-jeju" class="badge">제주: 잠금됨</div>
    </div>
</div>

<!-- 스토리 해금 모달 팝업 -->
<div id="storyModal">
    <div class="modal-content">
        <h2 id="modalTitle">지역 발견!</h2>
        <p id="modalText">스토리 텍스트</p>
        <p><strong>획득 보상:</strong> <span id="modalReward">보상</span></p>
        <button onclick="closeModal()">확인 및 기록하기</button>
    </div>
</div>

<script>
    // 1. QR 스캐너 초기화
    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, /* verbose= */ false);
    
    // 이미 발견한 지역을 저장하는 배열
    let unlockedRegions = [];

    // 2. QR 스캔 성공 시 실행되는 함수
    function onScanSuccess(decodedText, decodedResult) {
        // 예: QR 코드에 "INCHEON_01" 이라는 텍스트가 심어져 있다고 가정
        if (decodedText === "INCHEON_01" && !unlockedRegions.includes("인천")) {
            html5QrcodeScanner.pause(); // 카메라 일시정지
            showStory("인천 해역 방제 구역", 
                      "이곳은 3일 전 기름 유출 사고가 있었지만, 해양경찰의 신속한 방제로 지금은 해양 생물들이 다시 돌아왔습니다. 아치가 깨끗해진 바다를 기록합니다!", 
                      "해경 방제복 스킨 뱃지", 
                      "인천");
        }
    }

    // 스캔 실패 시 (지속적으로 백그라운드 실행되므로 로그 생략)
    function onScanFailure(error) { }

    html5QrcodeScanner.render(onScanSuccess, onScanFailure);

    // 3. 스토리 팝업 띄우기
    function showStory(title, text, reward, region) {
        document.getElementById("modalTitle").innerText = title;
        document.getElementById("modalText").innerText = text;
        document.getElementById("modalReward").innerText = reward;
        document.getElementById("storyModal").style.display = "block";
        
        unlockedRegions.push(region);
    }

    // 4. 팝업 닫기 및 도감 업데이트
    function closeModal() {
        document.getElementById("storyModal").style.display = "none";
        html5QrcodeScanner.resume(); // 카메라 다시 시작
        updateLogbook();
    }

    // 5. 도감 UI 업데이트
    function updateLogbook() {
        if (unlockedRegions.includes("인천")) {
            const incheonBadge = document.getElementById("badge-incheon");
            incheonBadge.classList.add("active");
            incheonBadge.innerText = "인천: 방제복 획득 완료 🎖️";
        }
    }
</script>

</body>
</html>
