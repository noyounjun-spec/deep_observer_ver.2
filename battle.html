<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심해의 기록자 - 해상 방어선</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f6f9; color: #333; text-align: center; margin: 0; padding: 20px; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .back-btn { background: #6c757d; color: white; text-decoration: none; padding: 10px 15px; border-radius: 8px; font-size: 14px; font-weight: bold; }
        
        /* 팀 편성 UI */
        #setupScreen { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .roster { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin-top: 15px; max-height: 350px; overflow-y: auto; padding-bottom: 10px; }
        
        .character-card { position: relative; width: 105px; height: 165px; background: white; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.08); display: flex; flex-direction: column; align-items: center; padding: 10px; border: 3px solid transparent; cursor: pointer; transition: 0.2s; box-sizing: border-box;}
        .character-card.selected { border-color: #ff9900; background: #fff8e1; transform: translateY(-5px); }
        
        .badge { position: absolute; top: 8px; right: 8px; font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 10px; z-index: 2; color: white;}
        .badge.common { background-color: #9ca3af; }
        .badge.rare { background-color: #3b82f6; }
        .badge.epic { background-color: #a855f7; }
        .badge.legendary { background-color: #eab308; }

        .character-img-wrapper { width: 75px; height: 75px; background-color: #f3f4f6; border-radius: 8px; margin-top: 12px; margin-bottom: 5px; overflow: hidden; }
        .character-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .char-name { font-size: 13px; font-weight: bold; margin-bottom: 3px; }
        .stat-text { font-size: 10px; color: #666; font-weight: bold; }
        .stat-text span.atk { color: #dc3545; }
        .stat-text span.hp { color: #28a745; }

        .start-btn { background: #ff9900; color: white; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 20px; width: 100%; max-width: 300px; display: none; margin-left: auto; margin-right: auto;}

        /* 전투 화면 UI */
        #battleScreen { display: none; background: url('https://images.unsplash.com/photo-1498623116890-37e912163d5d?q=80&w=1000&auto=format&fit=crop') center/cover; padding: 40px 20px; border-radius: 15px; border: 5px solid #0056b3; position: relative; overflow: hidden; height: 300px; }
        .battlefield { display: flex; justify-content: space-between; align-items: center; height: 100%; position: relative; z-index: 2; }
        .team-side, .enemy-side { display: flex; gap: 10px; align-items: flex-end; }
        
        .entity { text-align: center; width: 80px; }
        .entity img { width: 100%; height: auto; border-radius: 8px; background: rgba(255,255,255,0.9); }
        .hp-bar-bg { width: 100%; height: 10px; background: #dc3545; border-radius: 5px; margin-top: 5px; border: 1px solid black; }
        .hp-bar-fill { height: 100%; background: #28a745; width: 100%; transition: width 0.3s; }
        .entity-name { font-size: 12px; font-weight: bold; color: white; text-shadow: 1px 1px 3px black; margin-bottom: 5px; }

        .enemy-side .entity { width: 130px; }
        .enemy-side .entity img { filter: drop-shadow(0 0 10px red); }

        @keyframes attackRight { 0% { transform: translateX(0); } 50% { transform: translateX(40px); } 100% { transform: translateX(0); } }
        @keyframes attackLeft { 0% { transform: translateX(0); } 50% { transform: translateX(-40px); } 100% { transform: translateX(0); } }
        @keyframes takeDamage { 0% { filter: brightness(1); transform: rotate(0deg); } 50% { filter: brightness(1.5) inset 0 0 10px red; transform: rotate(-10deg); } 100% { filter: brightness(1); transform: rotate(0deg); } }
        
        .attacking-team { animation: attackRight 0.3s ease-out; }
        .attacking-enemy { animation: attackLeft 0.3s ease-out; }
        .hurt { animation: takeDamage 0.3s ease-out; }
        .dead { opacity: 0; pointer-events: none; transition: opacity 0.5s; }

        #logArea { margin-top: 15px; height: 150px; background: white; border-radius: 10px; padding: 15px; overflow-y: auto; text-align: left; font-size: 14px; border: 1px solid #ddd; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px dashed #eee; padding-bottom: 5px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1 style="margin:0; font-size: 20px;">⚔️ 해상 방어선 전투</h1>
        <a href="index.html" class="back-btn">도감으로 돌아가기</a>
    </div>
    
    <div id="setupScreen">
        <h3 style="margin-top:0; color:#0056b3;">출전할 캐릭터를 클릭(선택)하세요! (최대 3명)</h3>
        <p style="font-size:13px; color:#666;">카드를 누르면 아래에 '전투 시작' 버튼이 나타납니다.</p>
        <div class="roster" id="rosterArea"></div>
        <button class="start-btn" id="startBtn" onclick="startBattle()">전투 시작!</button>
    </div>

    <div id="battleScreen">
        <div class="battlefield">
            <div class="team-side" id="teamSide"></div>
            <div class="enemy-side" id="enemySide"></div>
        </div>
    </div>
    
    <div id="logArea"><div class="log-entry" style="color:#666;">아치를 선택하고 전투를 시작하세요.</div></div>

<script>
    const characterDB = [
        { id: "l1", name: "세종대왕", img: "세종대왕 아치.png", rarity: "레전더리", class: "legendary" },
        { id: "l2", name: "광개토대왕", img: "광개토대왕 아치.png", rarity: "레전더리", class: "legendary" },
        { id: "l3", name: "진흥왕", img: "진흥왕 아치.png", rarity: "레전더리", class: "legendary" },
        { id: "l4", name: "근초고왕", img: "근초고왕 아치.png", rarity: "레전더리", class: "legendary" },
        { id: "e1", name: "기사", img: "기사 아치.png", rarity: "에픽", class: "epic" },
        { id: "e2", name: "마법사", img: "마법사 아치.png", rarity: "에픽", class: "epic" },
        { id: "e3", name: "힐러", img: "힐러 아치.png", rarity: "에픽", class: "epic" },
        { id: "e4", name: "도적", img: "도적 아치.png", rarity: "에픽", class: "epic" },
        { id: "r1", name: "봄", img: "봄 아치.png", rarity: "레어", class: "rare" },
        { id: "r2", name: "여름", img: "여름 아치.png", rarity: "레어", class: "rare" },
        { id: "r3", name: "가을", img: "가을 아치.png", rarity: "레어", class: "rare" },
        { id: "r4", name: "겨울", img: "겨울 아치.png", rarity: "레어", class: "rare" },
        { id: "r5", name: "중부", img: "중부 아치.png", rarity: "레어", class: "rare" },
        { id: "r6", name: "서해", img: "서해 아치.png", rarity: "레어", class: "rare" },
        { id: "r7", name: "남해", img: "남해 아치.png", rarity: "레어", class: "rare" },
        { id: "r8", name: "동해", img: "동해 아치.png", rarity: "레어", class: "rare" },
        { id: "r9", name: "제주", img: "제주 아치.png", rarity: "레어", class: "rare" },
        { id: "c2", name: "과학자", img: "과학자 아치.png", rarity: "커먼", class: "common" },
        { id: "c3", name: "농부", img: "농부 아치.png", rarity: "커먼", class: "common" },
        { id: "c4", name: "산타", img: "산타 아치.png", rarity: "커먼", class: "common" },
        { id: "c5", name: "신랑", img: "신랑 아치.png", rarity: "커먼", class: "common" },
        { id: "c6", name: "신부", img: "신부 아치.png", rarity: "커먼", class: "common" },
        { id: "c7", name: "의사", img: "의사 아치.png", rarity: "커먼", class: "common" },
        { id: "c8", name: "잠수부", img: "잠수부 아치.png", rarity: "커먼", class: "common" },
        { id: "c9", name: "학생", img: "학생 아치.png", rarity: "커먼", class: "common" },
        { id: "c10", name: "화가", img: "화가 아치.png", rarity: "커먼", class: "common" }
    ];

    const STAT_MULT = { common: 1, rare: 1.5, epic: 2.5, legendary: 4 };

    let currentUser = localStorage.getItem('archieGacha_Session');
    let usersDB = JSON.parse(localStorage.getItem('archieGachaDB_v10')) || {};
    let myCol = (currentUser && usersDB[currentUser]) ? usersDB[currentUser].collection : [];
    
    let myTeam = [];
    let boss = { name: "거대 불법 조업선", img: "https://cdn-icons-png.flaticon.com/512/3063/3063822.png", maxHp: 1500, hp: 1500, atk: 40 };
    let battleTimer;

    window.onload = () => {
        if (!currentUser) {
            alert("도감에서 먼저 로그인을 진행해주세요!");
            window.location.href = "index.html";
            return;
        }
        initSetup();
    };

    function initSetup() {
        const rosterArea = document.getElementById('rosterArea');
        if (myCol.length === 0) {
            rosterArea.innerHTML = "<p style='color:#dc3545; font-weight:bold;'>보유한 아치가 없습니다. 도감에서 먼저 뽑기를 진행하세요!</p>";
            return;
        }

        characterDB.forEach(char => {
            if (myCol.includes(char.id)) {
                let mult = STAT_MULT[char.class] || 1;
                char.maxHp = Math.floor(100 * mult);
                char.atk = Math.floor(15 * mult);

                const card = document.createElement('div');
                card.className = 'character-card';
                card.innerHTML = `
                    <div class="badge ${char.class}">${char.rarity}</div>
                    <div class="character-img-wrapper">
                        <img src="${char.img}" onerror="this.src='https://via.placeholder.com/75?text=IMG'">
                    </div>
                    <div class="char-name">${char.name}</div>
                    <div class="stat-text"><span class="atk">ATK ${char.atk}</span> | <span class="hp">HP ${char.maxHp}</span></div>
                `;
                card.onclick = () => toggleSelect(char, card);
                rosterArea.appendChild(card);
            }
        });
    }

    function toggleSelect(char, cardEl) {
        const index = myTeam.findIndex(t => t.id === char.id);
        if (index > -1) {
            myTeam.splice(index, 1);
            cardEl.classList.remove('selected');
        } else {
            if (myTeam.length >= 3) return alert("최대 3명까지만 출전할 수 있습니다!");
            myTeam.push({ ...char, hp: char.maxHp });
            cardEl.classList.add('selected');
        }
        document.getElementById('startBtn').style.display = myTeam.length > 0 ? 'block' : 'none';
    }

    function startBattle() {
        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('battleScreen').style.display = 'block';
        document.getElementById('logArea').innerHTML = ""; 

        const teamSide = document.getElementById('teamSide');
        myTeam.forEach((char, idx) => {
            teamSide.innerHTML += `
                <div class="entity" id="team-${idx}">
                    <div class="entity-name">${char.name}</div>
                    <img src="${char.img}" onerror="this.src='https://via.placeholder.com/80?text=IMG'">
                    <div class="hp-bar-bg"><div class="hp-bar-fill" id="team-hp-${idx}"></div></div>
                </div>`;
        });

        document.getElementById('enemySide').innerHTML = `
            <div class="entity" id="boss">
                <div class="entity-name">${boss.name}</div>
                <img src="${boss.img}">
                <div class="hp-bar-bg"><div class="hp-bar-fill" id="boss-hp"></div></div>
            </div>`;

        log(`<strong style="color:#0056b3;">🌊 전투 시작! 아치 연합이 출격합니다!</strong>`);
        battleTimer = setInterval(battleTick, 1500);
    }

    function battleTick() {
        let aliveTeam = myTeam.filter(c => c.hp > 0);
        if (boss.hp <= 0 || aliveTeam.length === 0) return endGame();

        let totalDmg = 0;
        aliveTeam.forEach(char => {
            totalDmg += char.atk;
            let el = document.getElementById(`team-${myTeam.indexOf(char)}`);
            el.classList.remove('attacking-team');
            void el.offsetWidth;
            el.classList.add('attacking-team');
        });

        setTimeout(() => {
            boss.hp -= totalDmg;
            let bossEl = document.getElementById('boss');
            bossEl.classList.remove('hurt');
            void bossEl.offsetWidth;
            bossEl.classList.add('hurt');
            
            updateHpBar('boss-hp', boss.hp, boss.maxHp);
            log(`<span style="color:#dc3545; font-weight:bold;">아치 연합이 ${boss.name}에게 ${totalDmg}의 피해!</span>`);

            if (boss.hp <= 0) { bossEl.classList.add('dead'); return endGame(); }

            setTimeout(() => {
                let target = myTeam.find(c => c.hp > 0);
                if(target) {
                    let tIdx = myTeam.indexOf(target);
                    target.hp -= boss.atk;
                    
                    bossEl.classList.remove('attacking-enemy');
                    void bossEl.offsetWidth;
                    bossEl.classList.add('attacking-enemy');

                    let targetEl = document.getElementById(`team-${tIdx}`);
                    targetEl.classList.remove('hurt');
                    void targetEl.offsetWidth;
                    targetEl.classList.add('hurt');

                    updateHpBar(`team-hp-${tIdx}`, target.hp, target.maxHp);
                    log(`${boss.name}의 거친 파도 공격! ${target.name}이(가) ${boss.atk} 피해를 입었습니다.`);

                    if (target.hp <= 0) {
                        targetEl.classList.add('dead');
                        log(`<span style="color:#856404; background-color:#fff3cd; font-weight:bold; padding:2px 5px; border-radius:3px;">🚨 ${target.name} 기절!</span>`);
                    }
                }
            }, 600);
        }, 300);
    }

    function updateHpBar(id, cur, max) { document.getElementById(id).style.width = Math.max(0, (cur/max)*100) + "%"; }
    function log(msg) { 
        const l = document.getElementById('logArea'); 
        l.innerHTML += `<div class="log-entry">${msg}</div>`; 
        l.scrollTop = l.scrollHeight; 
    }

    function endGame() {
        clearInterval(battleTimer);
        if (boss.hp <= 0) log(`<span style="color:#28a745; font-weight:bold;">🎉 승리! 해양 방어선을 성공적으로 지켰습니다!</span>`);
        else log(`<span style="color:#dc3545; font-weight:bold;">💀 패배... 도감에서 더 강력한 아치를 소환해 오세요.</span>`);
    }
</script>
</body>
</html>
